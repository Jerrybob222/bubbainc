  <title style=" color: blue; " >Login</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
      background: #000000;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      text-align: center;
      width: 250px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
    }

    button {
      padding: 10px;
      width: 100%;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    #msg {
      color: red;
      margin-top: 10px;
    }
  </style>

<div class="box">
  <h2>Login</h2>

  <input id="username" placeholder="username">
  <input id="password" type="password" placeholder="password">

<!-- anyone using chrome console will get their ip address logged for a ban -->


  <button onclick="login()">Login</button>

  <p id="msg"></p>
</div>

<script>
  
  const users = {
    "admin": "niceshoes",
    "bubba": "inc",
    "john": "abc123"
  };

  function login() {
    const u = document.getElementById("username").value;
    const p = document.getElementById("password").value;

    if (users[u] && users[u] === p) {
      localStorage.setItem("loggedIn", "true");
      localStorage.setItem("user", u);

      window.location.href = "index.html";
    } else {
      document.getElementById("msg").textContent = "No";
    }
  }
</script>

</body>
</html>
